name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Setup
        uses: sisques-labs/workflows/.github/actions/setup@main
        with:
          node_version: "22"

      - name: Install dependencies
        uses: sisques-labs/workflows/.github/actions/install@main
        with:
          app_path: "."
          frozen_lockfile: "true"

      - name: Lint code
        run: pnpm lint

      - name: Check Kafka topic map is in sync
        run: pnpm gen:topics:check

      - name: Run unit tests
        run: pnpm test

      - name: Build the app
        run: pnpm build

  e2e:
    name: E2E tests (Postgres)
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nestjs_template_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nestjs_template_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_DRIVER: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: 5433
      DATABASE_DATABASE: nestjs_template_test
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      FRONTEND_URL: http://localhost:3001
      NODE_ENV: test

    steps:
      - name: Setup
        uses: sisques-labs/workflows/.github/actions/setup@main
        with:
          node_version: "22"

      - name: Install dependencies
        uses: sisques-labs/workflows/.github/actions/install@main
        with:
          app_path: "."
          frozen_lockfile: "true"

      - name: Apply database migrations
        run: pnpm migration:run

      - name: Run E2E tests
        run: pnpm test:e2e

  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nestjs_template_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nestjs_template_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_DRIVER: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: 5433
      DATABASE_DATABASE: nestjs_template_test
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      FRONTEND_URL: http://localhost:3001
      NODE_ENV: test

    steps:
      - name: Setup
        uses: sisques-labs/workflows/.github/actions/setup@main
        with:
          node_version: "22"

      - name: Install dependencies
        uses: sisques-labs/workflows/.github/actions/install@main
        with:
          app_path: "."
          frozen_lockfile: "true"

      - name: Apply database migrations
        run: pnpm migration:run

      - name: Run integration tests
        run: pnpm test:integration
