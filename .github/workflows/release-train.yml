name: Release Train

# TODO(rename-service): update image_name / ghcr_image_name below once this
# template becomes a real service (see scripts/rename-service.sh).

on:
  push:
    branches: [develop, staging, main]

permissions:
  contents: write
  packages: write

# One group for the whole repo: develop/staging/main releases are serialized
# so two channels never compute versions from a half-updated tag state.
concurrency:
  group: release-train
  cancel-in-progress: false

jobs:
  release:
    uses: sisques-labs/workflows/.github/workflows/release-train.yml@main
    with:
      image_name: sisqueslabs/nestjs-template
      ghcr_image_name: ghcr.io/sisques-labs/nestjs-template
      push_ghcr: true
      node_version: "22"
      run_lint: true
      run_test: true
      platforms: linux/amd64,linux/arm64
      sync_develop_after_stable: true
      sync_dependabot_updates_after_stable: true
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    permissions:
      contents: write
      packages: write
