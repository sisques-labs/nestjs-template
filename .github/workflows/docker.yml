name: Docker Build

on:
  pull_request:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  docker:
    name: Smoke build (buildx, no push)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          load: false
          tags: nestjs-template:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
