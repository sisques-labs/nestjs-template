# Dependabot version updates — PRs target `dependabot/updates`, run twice per month (~every two weeks).
# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: dependabot/updates
    schedule:
      interval: cron
      cronjob: "0 9 1,15 * *"
      timezone: UTC
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    target-branch: dependabot/updates
    schedule:
      interval: cron
      cronjob: "0 9 1,15 * *"
      timezone: UTC

  - package-ecosystem: docker
    directory: /
    target-branch: dependabot/updates
    schedule:
      interval: cron
      cronjob: "0 9 1,15 * *"
      timezone: UTC
